<div class="kanban" cdkDropListGroup role="region" aria-label="Kanban board">
  @for (column of tasks.columns; track column.key) {
    <section class="column" [attr.data-column]="column.key" [attr.aria-label]="column.label + ' column'">
      <header>
        <span class="column-title"><span class="column-indicator" aria-hidden="true"></span>{{ column.label }}</span>
        <span class="count">{{ tasks.tasksByStatus(column.key).length }}</span>
      </header>
      <div
        class="column-body"
        cdkDropList
        [id]="'col-' + column.key"
        [cdkDropListData]="tasks.tasksByStatus(column.key)"
        [cdkDropListConnectedTo]="tasks.columnConnectedTo()"
        (cdkDropListDropped)="tasks.drop($event, column.key)"
        role="list"
        [attr.aria-label]="column.label + ' tasks'"
      >
        @for (task of tasks.tasksByStatus(column.key); track task.id) {
          <app-task-card
            cdkDrag
            [cdkDragData]="task"
            [task]="task"
            [selected]="tasks.selectedTask()?.id === task.id"
            [memberColor]="memberColor"
            [initials]="initials"
            (select)="tasks.selectTask($event)"
            role="listitem"
          />
        } @empty {
          <div class="column-empty">Drop here</div>
        }
      </div>
    </section>
  }
</div>
