<section class="page board-page">
  <header class="page-header">
    <div>
      <h1>{{ workspace.activeProjectName() }}</h1>
      <p>{{ workspace.activeWorkspace().name }}</p>
    </div>
    <div class="header-actions">
      <div class="segmented" role="tablist" aria-label="Board view">
        <button type="button" [class.active]="tasks.boardView() === 'kanban'" (click)="setBoardView('kanban')">
          Board
        </button>
        <button type="button" [class.active]="tasks.boardView() === 'list'" (click)="setBoardView('list')">
          List
        </button>
      </div>
      <div class="search-field">
        <span class="material-symbols-rounded sm">search</span>
        <input
          [value]="tasks.searchQuery()"
          (input)="tasks.searchQuery.set($any($event.target).value)"
          placeholder="Search tasks"
          aria-label="Search tasks"
        />
      </div>
      <button type="button" class="btn primary" matRipple (click)="addQuickTask()">
        <span class="material-symbols-rounded sm">add</span>
        Task
      </button>
    </div>
  </header>

  <div class="board-layout" [class.with-drawer]="!!tasks.selectedTask()">
    @if (tasks.boardView() === 'kanban') {
      <app-kanban-board />
    } @else {
      <app-task-list-view />
    }

    @if (tasks.selectedTask()) {
      <app-task-detail-drawer />
    }
  </div>
</section>
