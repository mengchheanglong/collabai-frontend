<div class="task-top">
  <span class="task-id">{{ task().id }}</span>
  <span class="pill" [class]="priorityClass(task().priority)">{{ task().priority }}</span>
</div>
<h3>{{ task().title }}</h3>
@if (task().tags.length) {
  <div class="tags">
    @for (tag of task().tags.slice(0, 2); track tag) {
      <span class="tag">{{ tag }}</span>
    }
  </div>
}
<footer>
  <span class="avatar sm" [style.background]="memberColor()(task().assignee)" [matTooltip]="task().assignee">
    {{ initials()(task().assignee) }}
  </span>
  <span class="meta">{{ task().dueDate }}</span>
  @if (task().comments) {
    <span class="meta">
      <span class="material-symbols-rounded sm">chat_bubble</span>
      {{ task().comments }}
    </span>
  }
</footer>
