<nav class="mobile-nav" aria-label="Mobile">
  @for (page of pages; track page.key) {
    <a [routerLink]="'/' + page.key" routerLinkActive="active" #navLink="routerLinkActive">
      <span class="material-symbols-rounded" [class.filled]="navLink.isActive">{{ page.icon }}</span>
      <span>{{ page.label }}</span>
    </a>
  }
  <a routerLink="/profile" routerLinkActive="active" #profileLink="routerLinkActive">
    <span class="material-symbols-rounded" [class.filled]="profileLink.isActive">person</span>
    <span>You</span>
  </a>
</nav>
